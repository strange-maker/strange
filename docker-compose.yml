name: schneider-sales-intelligence

x-backend: &backend
  build:
    context: .
    dockerfile: backend/Dockerfile
  env_file: .env
  restart: unless-stopped
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-salesintel}
      POSTGRES_USER: ${POSTGRES_USER:-salesintel}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes: [postgres_data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes: [redis_data:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  migrate:
    <<: *backend
    command: ["alembic", "-c", "alembic.ini", "upgrade", "head"]
    restart: "no"

  api:
    <<: *backend
    command: ["sh", "-c", "exec uvicorn api:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips=${FORWARDED_ALLOW_IPS:-127.0.0.1}"]
    ports: ["8000:8000"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/ready')"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    <<: *backend
    command: ["celery", "-A", "celery_app.celery", "worker", "--loglevel=INFO", "--concurrency=4"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}

  scheduler:
    <<: *backend
    command: ["celery", "-A", "celery_app.celery", "beat", "--loglevel=INFO"]
    depends_on:
      migrate: {condition: service_completed_successfully}
      redis: {condition: service_healthy}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:8000}
    ports: ["3000:3000"]
    restart: unless-stopped
    depends_on:
      api: {condition: service_healthy}

volumes:
  postgres_data:
  redis_data:
