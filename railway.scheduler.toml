# Scheduler service config. Railway service Config File path: /railway.scheduler.toml
# Keep Scale at exactly one replica. Zero overlap prevents two Beat processes
# during deployment; the Redis singleton in tasks.py is a second safety layer.
[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"
watchPatterns = ["backend/**", "public/sources.yaml", "railway.scheduler.toml"]

[deploy]
startCommand = "celery -A celery_app.celery beat --loglevel=INFO"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
overlapSeconds = 0
drainingSeconds = 30
